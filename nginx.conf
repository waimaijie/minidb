server {
    listen 80;
    
    # 拦截所有 80 端口请求 (通吃 IP 和域名)
    server_name _; 

    # 基础超时时间
    keepalive_timeout 65s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location /rest/v1/ {
        proxy_pass http://postgrest:3000/;
        
        # 【核心修正】强制 HTTP/1.1 并清空逐跳头，让内部独立协商长连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header 'Cache-Control' 'no-store, no-cache, must-revalidate' always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }
    }

    location / {
        proxy_pass http://postgrest:3000/;
        
        # 【核心修正】强制 HTTP/1.1 并清空逐跳头
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header 'Cache-Control' 'no-store, no-cache, must-revalidate' always;        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }
    }
}