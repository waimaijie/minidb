server {
    # 监听 80 端口（HTTPS 由 Cloudflare 边缘节点负责，服务器内走 HTTP 即可）
    listen 80;
    
    # 🚨🚨🚨 【重要】在这里填入你真实解析到这台服务器的 API 域名
    # 例如: server_name api.yourdomain.com;
    server_name db.dwz.dpdns.org;

    # 针对 Supabase 标准 API 路径的代理
    location /rest/v1/ {
        # 转发给同一 Docker 网络下的 PostgREST 容器
        proxy_pass http://postgrest:3000/;
        
        # 传递客户端真实信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 【核心配置】获取 Cloudflare 代理后的真实用户 IP，这对防刷风控非常重要
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        # 跨域 (CORS) 支持：允许任何前端调用这个 API
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer' always;

        # 处理浏览器的 OPTIONS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }
    }

    # 兜底路由：处理直接访问根路径或其他未匹配路径的请求
    location / {
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE';
            add_header 'Access-Control-Allow-Headers' 'Authorization, apikey, Content-Type, Prefer';
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }
    }
}