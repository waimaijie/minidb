version: '3'
services:
  db:
    image: postgres:15-alpine
    container_name: mini_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c shared_buffers=64MB -c max_connections=50 -c work_mem=4MB -c maintenance_work_mem=16MB

  postgrest:
    image: postgrest/postgrest:latest
    container_name: mini_postgrest
    restart: always
    environment:
      PGRST_DB_URI: postgres://authenticator:${DB_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: mini_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - postgrest

volumes:
  pgdata: